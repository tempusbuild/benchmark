# Pin record for the flask case study (documentation + attribution; the workflow files are the
# source of truth). The case study fetches flask at the pinned commit AT PIPELINE TIME and runs its
# own test command — flask's code is never stored in this repo.

upstream:
  repo: pallets/flask
  # Pinned commit: the case study is reproducible at this exact upstream state. Bump deliberately;
  # every published number records this ref and the date it was run.
  ref: 22d924701a6ae2e4cd01e9a15bbaf3946094af65 # v3.1.3
  license: BSD-3-Clause

# flask's own test command, reduced to one comparable Linux leg (Python 3.14).
run: uv run --locked tox run -e py3.14

workflows:
  reusable: .github/workflows/casestudy-flask.yml
  tempus: .github/workflows/casestudy-flask-tempus.yml
  github: .github/workflows/casestudy-flask-github.yml
