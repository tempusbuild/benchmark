name: casestudy-django

# Real-OSS case study: django/django's own test command, run on both runners. django is fetched at
# pipeline time at a pinned commit — its code is NOT stored in this repo. The job is reduced to one
# comparable Linux leg (Python 3.14, SQLite, --parallel). The two thin callers
# (casestudy-django-{tempus,github}.yml) differ only in the `runner` input, so the only variable
# is the runner. See case-studies/README.md.
on:
  workflow_call:
    inputs:
      runner:
        description: "runs-on label to benchmark"
        required: true
        type: string

permissions:
  contents: read

jobs:
  django:
    name: django tests (${{ inputs.runner }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    steps:
      - name: Check out django at the pinned commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: django/django
          ref: ee93f65169c280c9ab3d2ce103dd478c96d05065 # v6.0.6
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      # django's own Linux CI steps (their .github/workflows/python_matrix.yml): install
      # libmemcached-dev (pylibmc has no wheels for Python 3.12+ and the runner images don't bundle
      # the headers, so django installs them itself), upgrade packaging tools, install the test
      # dependencies, run runtests.py on SQLite. Identical on both runners; no action-level cache
      # is enabled — the honest cold path (warm = a primed colocated proxy, set up by the operator).
      - name: Install libmemcached-dev for pylibmc
        run: sudo apt-get update && sudo apt-get install -y libmemcached-dev
      - name: Install django and test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r tests/requirements/py3.txt -e .
      - name: Run django's test suite
        run: python -Wall tests/runtests.py -v2
