name: casestudy-flask-github

# Runs the flask case study on a GitHub-hosted runner. Identical to casestudy-flask-tempus.yml apart
# from the `runner` input. workflow_dispatch only, to match the tempus caller.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  casestudy:
    uses: ./.github/workflows/casestudy-flask.yml
    permissions:
      contents: read
    with:
      runner: ubuntu-latest
