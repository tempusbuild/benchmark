name: casestudy-flask

# Real-OSS case study: pallets/flask's own test command, run on both runners. flask is fetched at
# pipeline time at a pinned commit — its code is NOT stored in this repo. The job is reduced to one
# comparable Linux leg (Python 3.14). The two thin callers (casestudy-flask-{tempus,github}.yml)
# differ only in the `runner` input, so the only variable is the runner. See case-studies/README.md.
on:
  workflow_call:
    inputs:
      runner:
        description: "runs-on label to benchmark"
        required: true
        type: string

permissions:
  contents: read

jobs:
  flask:
    name: flask tests (${{ inputs.runner }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    steps:
      - name: Check out flask at the pinned commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: pallets/flask
          ref: 22d924701a6ae2e4cd01e9a15bbaf3946094af65 # v3.1.3
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      # flask's own test command at this pin, pinned to the Python 3.14 tox env. No action-level
      # cache: this is the honest cold path (warm = a primed colocated proxy, set up by the operator).
      - name: Run flask's test suite
        run: uv run --locked tox run -e py3.14
